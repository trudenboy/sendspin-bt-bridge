repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args:
          - --fix
          - --extend-ignore=UP038
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.27
    hooks:
      # `uv lock --check` — fail if uv.lock is out of sync with pyproject.toml.
      - id: uv-lock
      # Regenerate requirements.txt from uv.lock and abort the commit if the
      # working tree's requirements.txt would change. Keeps the LXC pip3
      # install path on the same dependency set as Docker / CI / local dev.
      - id: uv-export
        args:
          - "--no-hashes"
          - "--no-dev"
          - "--no-emit-project"
          - "--output-file"
          - "requirements.txt"

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        require_serial: true
        exclude: "(sendspin-cli/|scripts/)"

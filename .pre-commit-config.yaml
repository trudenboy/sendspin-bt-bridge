repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args:
          - --fix
          - --extend-ignore=UP038
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        require_serial: true
        exclude: "(sendspin-cli/|scripts/)"

      - id: sync-requirements
        name: sync requirements.txt and pyproject.toml deps
        entry: python3 scripts/sync_requirements.py --check
        language: system
        files: '^(requirements\.txt|pyproject\.toml)$'
        pass_filenames: false

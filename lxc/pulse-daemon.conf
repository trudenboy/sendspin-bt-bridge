# /etc/pulse/daemon.conf
# CPU-optimal PulseAudio settings for Sendspin LXC deployment.
# Installed by install.sh.

resample-method = trivial        # ~10× less CPU vs speex-float-3; zero-order hold
default-sample-format = s16le   # 16-bit PCM: avoids float32 conversion overhead
default-sample-rate = 48000     # Match MA output rate → zero resampling
high-priority = yes              # PA gets elevated priority when available
realtime-scheduling = yes        # SCHED_RR for audio threads
flat-volumes = no                # No per-stream volume rescaling
enable-lfe-remixing = no         # Skip LFE (subwoofer) channel processing

<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  D-Bus policy for Sendspin BT Bridge LXC container.
  Install on the OpenWrt HOST at /etc/dbus-1/system.d/pulseaudio-lxc.conf

  Allows the container's PulseAudio (running as any UID, since the host
  has no 'pulse' user) to access BlueZ for Bluetooth A2DP audio.
  The container reaches the host D-Bus via a bind-mounted socket at /bt-dbus.
-->
<busconfig>
  <policy context="default">
    <!-- PulseAudio ownership -->
    <allow own="org.pulseaudio.Server"/>

    <!-- BlueZ access for Bluetooth audio -->
    <allow send_destination="org.bluez"/>
    <allow send_interface="org.bluez.MediaEndpoint1"/>
    <allow send_interface="org.bluez.MediaTransport1"/>
    <allow send_interface="org.bluez.Profile1"/>

    <!-- D-Bus introspection (required by PA for BlueZ discovery) -->
    <allow send_interface="org.freedesktop.DBus.ObjectManager"/>
    <allow send_interface="org.freedesktop.DBus.Properties"/>
  </policy>
</busconfig>

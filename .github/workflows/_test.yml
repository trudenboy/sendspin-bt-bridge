name: _test

on:
  workflow_call:
    inputs:
      version:
        description: "Version to inject into config.py before testing (empty = skip)"
        required: false
        type: string
        default: ""
      ref:
        description: "Git ref to checkout (empty = default)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Inject version into config.py
        if: inputs.version != ''
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i "s/^VERSION = .*/VERSION = \"${VERSION}\"/" config.py
          sed -i "s/^BUILD_DATE = .*/BUILD_DATE = \"$(date -u +%Y-%m-%d)\"/" config.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libglib2.0-dev libportaudio2

      - name: Install dependencies
        run: pip install -r requirements.txt -r dev-requirements.txt pytest-cov

      - name: Audit dependencies for CVEs
        # Audit the already-installed venv (no -r flag) so pip-audit
        # doesn't spin up a fresh sandbox virtualenv that re-resolves
        # metadata and tries to recompile dbus-python from source.
        # The cheaper signal here is "audit what we just installed" —
        # one network round-trip to the OSV/PyPI advisory feed, no
        # extra meson/ninja work.  Failing CVEs block the workflow.
        #
        # ``pip`` itself is the package manager, not a shipped runtime
        # dep — its CVEs only apply when running pip on attacker-
        # controlled inputs (we don't), and the GitHub setup-python
        # toolchain rolls pip forward automatically.  Explicit
        # ``--ignore-vuln`` per-ID with the rationale here so a new
        # pip CVE gets a deliberate review rather than a silent skip.
        run: |
          pip install pip-audit
          pip-audit \
            --ignore-vuln CVE-2025-8869 \
            --ignore-vuln CVE-2026-1703 \
            --ignore-vuln CVE-2026-3219

      - name: Run sendspin compatibility smoke test
        run: python scripts/check_sendspin_compat.py

      - name: Run tests
        run: python -m pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=50 -q

      - name: Check test modifications are intentional
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # List test files changed in this PR
          changed_tests=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA" -- 'tests/' || true)
          if [ -z "$changed_tests" ]; then
            echo "No test files changed — skipping check."
            exit 0
          fi
          echo "::group::Changed test files"
          echo "$changed_tests"
          echo "::endgroup::"
          # Count non-test source files changed alongside tests
          changed_src=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA" -- '*.py' ':!tests/' || true)
          test_count=$(echo "$changed_tests" | wc -l | tr -d ' ')
          src_count=$(echo "$changed_src" | wc -l | tr -d ' ')
          # Warn when tests change without source, or many tests change at once
          if [ "$src_count" -eq 0 ] && [ "$test_count" -gt 0 ]; then
            echo "::warning::$test_count test file(s) modified with no source changes — verify this is intentional (TDD red phase or test refactor)."
          elif [ "$test_count" -gt 5 ]; then
            echo "::warning::$test_count test files modified — bulk test changes deserve extra review."
          fi

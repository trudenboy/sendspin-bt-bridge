name: Pytest

on:
  workflow_run:
    workflows:
      - Lint
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pytest-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libglib2.0-dev libportaudio2
      - name: Install dependencies
        run: pip install -r requirements.txt -r dev-requirements.txt pytest-cov
      - name: Run sendspin compatibility smoke test
        run: python scripts/check_sendspin_compat.py
      - name: Run tests
        run: python -m pytest tests/ --cov=. --cov-report=term-missing --cov-fail-under=50 -q

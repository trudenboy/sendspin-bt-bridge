name: Archive Traffic Stats

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TRAFFIC_METRICS_TOKEN: ${{ secrets.TRAFFIC_METRICS_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check traffic token
        id: traffic-token
        run: |
          if [ -z "${TRAFFIC_METRICS_TOKEN}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping traffic archive because secret TRAFFIC_METRICS_TOKEN is not configured. Use a fine-grained PAT with Administration: read, Contents: write, and Packages: read for this repository."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Switch to traffic-data branch
        if: steps.traffic-token.outputs.available == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin traffic-data >/dev/null 2>&1; then
            git fetch origin traffic-data
            git switch --track -C traffic-data origin/traffic-data
          else
            git switch --orphan traffic-data
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p traffic/clones traffic/views traffic/referrers traffic/paths traffic/releases traffic/repo traffic/container traffic/dev

      - name: Fetch traffic data
        if: steps.traffic-token.outputs.available == 'true'
        uses: actions/github-script@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ env.TRAFFIC_METRICS_TOKEN }}
          script: |
            const fs = require('fs');
            const date = new Date().toISOString().split('T')[0];
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');

            function writeJson(path, data) {
              fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
            }

            function buildRepoSnapshot(repoData) {
              return {
                full_name: repoData.full_name,
                default_branch: repoData.default_branch,
                open_issues_count: repoData.open_issues_count,
                stargazers_count: repoData.stargazers_count,
                subscribers_count: repoData.subscribers_count,
                watchers_count: repoData.watchers_count,
                forks_count: repoData.forks_count,
                network_count: repoData.network_count,
                size_kb: repoData.size,
                pushed_at: repoData.pushed_at,
                updated_at: repoData.updated_at,
              };
            }

            function buildReleaseSnapshot(releases) {
              const releaseItems = releases
                .filter((release) => !release.draft)
                .map((release) => {
                  const assets = (release.assets || []).map((asset) => ({
                    name: asset.name,
                    download_count: asset.download_count ?? 0,
                    size: asset.size,
                    content_type: asset.content_type,
                    created_at: asset.created_at,
                    updated_at: asset.updated_at,
                  }));
                  const asset_downloads = assets.reduce(
                    (sum, asset) => sum + asset.download_count,
                    0
                  );
                  return {
                    tag_name: release.tag_name,
                    name: release.name || release.tag_name,
                    prerelease: Boolean(release.prerelease),
                    published_at: release.published_at,
                    created_at: release.created_at,
                    html_url: release.html_url,
                    asset_downloads,
                    assets,
                  };
                });

              return {
                total_downloads: releaseItems.reduce(
                  (sum, release) => sum + release.asset_downloads,
                  0
                ),
                release_count: releaseItems.length,
                latest_release_tag: releaseItems[0]?.tag_name || null,
                latest_release_published_at: releaseItems[0]?.published_at || null,
                releases: releaseItems,
              };
            }

            let clones;
            let views;
            let referrers;
            let paths;
            try {
              [clones, views, referrers, paths] = await Promise.all([
                github.rest.repos.getClones({ owner, repo, per: 'day' }),
                github.rest.repos.getViews({ owner, repo, per: 'day' }),
                github.rest.repos.getTopReferrers({ owner, repo }),
                github.request('GET /repos/{owner}/{repo}/traffic/popular/paths', { owner, repo }),
              ]);
            } catch (error) {
              if (error && error.status === 403) {
                throw new Error(
                  'GitHub Traffic API returned 403. TRAFFIC_METRICS_TOKEN must grant repository Administration: read access.'
                );
              }
              throw error;
            }

            const [repoResponse, releases] = await Promise.all([
              github.rest.repos.get({ owner, repo }),
              github.paginate(github.rest.repos.listReleases, { owner, repo, per_page: 100 }),
            ]);

            const repoSnapshot = buildRepoSnapshot(repoResponse.data);
            const releaseSnapshot = buildReleaseSnapshot(releases);

            // Fetch issues/PRs and CI workflow stats
            const [openIssues, closedIssues, openPRs, closedPRs, workflowsResp] = await Promise.all([
              github.request('GET /search/issues', { q: `repo:${owner}/${repo}+type:issue+state:open` }),
              github.request('GET /search/issues', { q: `repo:${owner}/${repo}+type:issue+state:closed` }),
              github.request('GET /search/issues', { q: `repo:${owner}/${repo}+type:pr+state:open` }),
              github.request('GET /search/issues', { q: `repo:${owner}/${repo}+type:pr+state:closed` }),
              github.rest.actions.listRepoWorkflows({ owner, repo }),
            ]);

            const issuesSnapshot = {
              open_issues: openIssues.data.total_count,
              closed_issues: closedIssues.data.total_count,
              open_prs: openPRs.data.total_count,
              closed_prs: closedPRs.data.total_count,
            };

            // Fetch per-workflow CI stats (only user-facing workflows, skip reusable _prefixed ones)
            const userWorkflows = workflowsResp.data.workflows.filter(
              (w) => w.state === 'active' && !w.name.startsWith('_')
            );
            const ciWorkflows = [];
            for (const wf of userWorkflows) {
              try {
                const [totalResp, successResp, failureResp] = await Promise.all([
                  github.rest.actions.listWorkflowRuns({ owner, repo, workflow_id: wf.id, per_page: 1 }),
                  github.rest.actions.listWorkflowRuns({ owner, repo, workflow_id: wf.id, status: 'success', per_page: 1 }),
                  github.rest.actions.listWorkflowRuns({ owner, repo, workflow_id: wf.id, status: 'failure', per_page: 1 }),
                ]);
                const lastRun = totalResp.data.workflow_runs[0] || null;
                ciWorkflows.push({
                  name: wf.name,
                  total_runs: totalResp.data.total_count,
                  success_runs: successResp.data.total_count,
                  failure_runs: failureResp.data.total_count,
                  last_status: lastRun?.conclusion || lastRun?.status || null,
                  last_run_at: lastRun?.created_at || null,
                });
              } catch (e) {
                console.log(`  CI stats for ${wf.name} failed: ${e.message}`);
              }
            }

            // GHCR container versions are fetched later during the container summary section

            // Fetch development activity stats
            const [participationResp, codeFreqResp] = await Promise.all([
              github.request('GET /repos/{owner}/{repo}/stats/participation', { owner, repo }),
              github.request('GET /repos/{owner}/{repo}/stats/code_frequency', { owner, repo }),
            ]);

            // Commit activity from participation API (52 weeks)
            const participation = participationResp.data;
            const weeklyCommits = (participation.all || []).map((total, i) => ({
              week_offset: i - 51,
              total,
              owner: (participation.owner || [])[i] || 0,
            }));

            // Code frequency (weekly additions/deletions)
            const codeFrequency = Array.isArray(codeFreqResp.data)
              ? codeFreqResp.data.map(([ts, additions, deletions]) => ({
                  week: new Date(ts * 1000).toISOString().slice(0, 10),
                  additions,
                  deletions: Math.abs(deletions),
                }))
              : [];

            // AI co-authored commits — scan last 200 commits for Co-authored-by trailers
            const aiAgents = {};
            let totalCommitsScanned = 0;
            let aiCommitCount = 0;
            for (let page = 1; page <= 2; page++) {
              const commitsResp = await github.rest.repos.listCommits({
                owner, repo, per_page: 100, page,
              });
              const commits = commitsResp.data;
              if (!commits.length) break;
              totalCommitsScanned += commits.length;
              for (const c of commits) {
                const msg = c.commit.message || '';
                const matches = msg.matchAll(/Co-authored-by:\s*([^<]+)</g);
                const agents = new Set();
                for (const m of matches) {
                  const name = m[1].trim();
                  if (name) agents.add(name);
                }
                if (agents.size > 0) {
                  aiCommitCount++;
                  for (const name of agents) {
                    aiAgents[name] = (aiAgents[name] || 0) + 1;
                  }
                }
              }
            }

            const devSnapshot = {
              weekly_commits: weeklyCommits.filter(w => w.total > 0),
              code_frequency: codeFrequency.filter(w => w.additions > 0 || w.deletions > 0),
              ai: {
                commits_scanned: totalCommitsScanned,
                ai_commits: aiCommitCount,
                ai_ratio: totalCommitsScanned > 0 ? +(aiCommitCount / totalCommitsScanned).toFixed(3) : 0,
                agents: Object.entries(aiAgents)
                  .map(([name, count]) => ({ name, commits: count }))
                  .sort((a, b) => b.commits - a.commits),
              },
            };

            writeJson(`traffic/dev/${date}.json`, devSnapshot);

            writeJson(`traffic/clones/${date}.json`, clones.data);
            writeJson(`traffic/views/${date}.json`, views.data);
            writeJson(`traffic/referrers/${date}.json`, referrers.data);
            writeJson(`traffic/paths/${date}.json`, paths.data);
            writeJson(`traffic/releases/${date}.json`, releaseSnapshot);
            writeJson(`traffic/repo/${date}.json`, repoSnapshot);

            fs.mkdirSync('traffic/issues', { recursive: true });
            fs.mkdirSync('traffic/ci', { recursive: true });
            writeJson(`traffic/issues/${date}.json`, issuesSnapshot);
            writeJson(`traffic/ci/${date}.json`, ciWorkflows);

            // Update cumulative summary
            let summary = {};
            const summaryPath = 'traffic/summary.json';
            if (fs.existsSync(summaryPath)) {
              summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            }

            // Merge daily clone data (deduplicate by timestamp)
            if (!summary.clones) summary.clones = {};
            for (const entry of clones.data.clones || []) {
              summary.clones[entry.timestamp] = { count: entry.count, uniques: entry.uniques };
            }
            summary.clones_window = {
              count: clones.data.count ?? 0,
              uniques: clones.data.uniques ?? 0,
            };

            // Merge daily view data (deduplicate by timestamp)
            if (!summary.views) summary.views = {};
            for (const entry of views.data.views || []) {
              summary.views[entry.timestamp] = { count: entry.count, uniques: entry.uniques };
            }
            summary.views_window = {
              count: views.data.count ?? 0,
              uniques: views.data.uniques ?? 0,
            };

            // Update latest referrers snapshot
            summary.referrers = referrers.data;
            summary.paths = paths.data;
            summary.repo = repoSnapshot;
            if (!summary.repo_history) summary.repo_history = {};
            summary.repo_history[date] = repoSnapshot;

            summary.releases = {
              total_downloads: releaseSnapshot.total_downloads,
              release_count: releaseSnapshot.release_count,
              latest_release_tag: releaseSnapshot.latest_release_tag,
              latest_release_published_at: releaseSnapshot.latest_release_published_at,
              by_tag: Object.fromEntries(
                releaseSnapshot.releases.map((release) => [
                  release.tag_name,
                  {
                    name: release.name,
                    prerelease: release.prerelease,
                    published_at: release.published_at,
                    html_url: release.html_url,
                    asset_downloads: release.asset_downloads,
                    assets: release.assets,
                  },
                ])
              ),
            };
            if (!summary.release_history) summary.release_history = {};
            summary.release_history[date] = {
              total_downloads: releaseSnapshot.total_downloads,
              release_count: releaseSnapshot.release_count,
              latest_release_tag: releaseSnapshot.latest_release_tag,
            };

            // Issues & PRs summary
            summary.issues = issuesSnapshot;
            if (!summary.issues_history) summary.issues_history = {};
            summary.issues_history[date] = issuesSnapshot;

            // CI workflows summary
            summary.ci = ciWorkflows;
            if (!summary.ci_history) summary.ci_history = {};
            summary.ci_history[date] = ciWorkflows.map(w => ({
              name: w.name,
              total_runs: w.total_runs,
              success_runs: w.success_runs,
              failure_runs: w.failure_runs,
            }));

            // Development activity summary
            summary.dev = devSnapshot;
            if (!summary.dev_history) summary.dev_history = {};
            summary.dev_history[date] = {
              total_weekly_commits: weeklyCommits.reduce((s, w) => s + w.total, 0),
              ai_commits: devSnapshot.ai.ai_commits,
              ai_ratio: devSnapshot.ai.ai_ratio,
            };

            // Container summary — scrape download counts from GHCR HTML pages
            const containerByTag = {};
            let containerTotal = 0;
            let containerTagged = 0;

            try {
              // Use GITHUB_TOKEN (with packages:read) via raw fetch since github-script
              // doesn't support importing @actions/github for a second Octokit instance
              const pkgToken = process.env.GITHUB_TOKEN;
              const pkgHeaders = {
                Authorization: `token ${pkgToken}`,
                Accept: 'application/vnd.github+json',
                'User-Agent': 'GitHub-Actions-Traffic-Collector',
              };

              // Paginate through all package versions
              const pkgVersions = [];
              let page = 1;
              while (true) {
                const resp = await fetch(
                  `https://api.github.com/users/${owner}/packages/container/sendspin-bt-bridge/versions?per_page=100&page=${page}`,
                  { headers: pkgHeaders }
                );
                if (!resp.ok) throw new Error(`Packages API: ${resp.status} ${resp.statusText}`);
                const data = await resp.json();
                if (!data.length) break;
                pkgVersions.push(...data);
                page++;
              }
              containerTotal = pkgVersions.length;

              // Build map: semver tag → version id (stable only, e.g. "2.52.1")
              const tagToVersion = {};
              for (const v of pkgVersions) {
                const tags = v.metadata?.container?.tags || [];
                if (tags.length > 0) containerTagged++;
                for (const tag of tags) {
                  if (/^\d+\.\d+\.\d+$/.test(tag)) {
                    tagToVersion[tag] = v.id;
                  }
                }
              }

              // Match release tags (v2.52.1) to container tags (2.52.1)
              const releaseTags = Object.keys(summary.releases?.by_tag || {});
              const stableReleaseTags = releaseTags
                .filter(t => !summary.releases.by_tag[t].prerelease)
                .sort((a, b) => {
                  const da = summary.releases.by_tag[a].published_at || '';
                  const db = summary.releases.by_tag[b].published_at || '';
                  return db.localeCompare(da);
                })
                .slice(0, 35);

              // Scrape download counts in parallel batches of 5
              const toScrape = [];
              for (const releaseTag of stableReleaseTags) {
                const containerTag = releaseTag.replace(/^v/, '');
                const versionId = tagToVersion[containerTag];
                if (versionId) {
                  toScrape.push({ releaseTag, containerTag, versionId });
                }
              }

              const BATCH = 5;
              for (let i = 0; i < toScrape.length; i += BATCH) {
                const batch = toScrape.slice(i, i + BATCH);
                const results = await Promise.all(batch.map(async ({ releaseTag, containerTag, versionId }) => {
                  try {
                    const url = `https://github.com/trudenboy/sendspin-bt-bridge/pkgs/container/sendspin-bt-bridge/${versionId}?tag=${containerTag}`;
                    const resp = await fetch(url, { headers: { 'User-Agent': 'GitHub-Actions-Traffic-Collector' } });
                    const html = await resp.text();
                    const match = html.match(/Total downloads[\s\S]*?(\d[\d,]*)/);
                    const downloads = match ? parseInt(match[1].replace(/,/g, ''), 10) : 0;
                    return { releaseTag, downloads };
                  } catch (e) {
                    console.log(`  Scrape failed for ${releaseTag}: ${e.message}`);
                    return { releaseTag, downloads: 0 };
                  }
                }));
                for (const { releaseTag, downloads } of results) {
                  containerByTag[releaseTag] = downloads;
                }
              }

              console.log(`Scraped container downloads for ${Object.keys(containerByTag).length} releases`);
            } catch (err) {
              console.log(`Container stats unavailable: ${err.message}`);
            }

            summary.container = {
              total_versions: containerTotal,
              tagged_versions: containerTagged,
              latest_tags: [],
              by_tag: containerByTag,
            };
            if (!summary.container_history) summary.container_history = {};
            summary.container_history[date] = {
              total_versions: containerTotal,
              tagged_versions: containerTagged,
            };

            summary.last_updated = new Date().toISOString();

            writeJson(summaryPath, summary);

            console.log(`Archived traffic data for ${date}`);
            console.log(`Clones: ${clones.data.count} total, ${clones.data.uniques} unique`);
            console.log(`Views: ${views.data.count} total, ${views.data.uniques} unique`);
            console.log(`Referrers: ${referrers.data.length} sources`);
            console.log(`Popular paths: ${paths.data.length} items`);
            console.log(
              `Releases: ${releaseSnapshot.release_count} total, ${releaseSnapshot.total_downloads} asset downloads`
            );
            console.log(
              `Repo snapshot: ${repoSnapshot.stargazers_count} stars, ${repoSnapshot.forks_count} forks, ${repoSnapshot.subscribers_count} subscribers`
            );
            console.log(
              `Container: ${containerTotal} total versions, ${containerTagged} tagged, ${Object.keys(containerByTag).length} with download data`
            );
            console.log(
              `Issues: ${issuesSnapshot.open_issues} open, ${issuesSnapshot.closed_issues} closed | PRs: ${issuesSnapshot.open_prs} open, ${issuesSnapshot.closed_prs} closed`
            );
            console.log(
              `CI: ${ciWorkflows.length} workflows tracked`
            );
            console.log(
              `Dev: ${devSnapshot.weekly_commits.length} active weeks, ${devSnapshot.code_frequency.length} code-freq weeks, ${devSnapshot.ai.ai_commits}/${devSnapshot.ai.commits_scanned} AI co-authored commits`
            );

      - name: Commit and push
        if: steps.traffic-token.outputs.available == 'true'
        run: |
          git add traffic/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Traffic data $(date -I)"
            git push origin HEAD:traffic-data
          fi

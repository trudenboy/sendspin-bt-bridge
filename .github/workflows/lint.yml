name: Lint

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs-site/**"
      - "*.md"
      - "ha-addon/CHANGELOG.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs-site/**"
      - "*.md"
      - "ha-addon/CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.0.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: Lint ha-addon/Dockerfile
        uses: hadolint/hadolint-action@v3.0.0
        with:
          dockerfile: ha-addon/Dockerfile
          config: .hadolint.yaml

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r requirements.txt || true

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy --config-file pyproject.toml *.py routes/ services/

name: Lint

on:
  push:
    branches:
      - main
      - beta
    tags:
      - "v*"
    paths-ignore:
      - "docs-site/**"
      - "*.md"
      - "ha-addon/CHANGELOG.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs-site/**"
      - "*.md"
      - "ha-addon/CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint Dockerfile
          hadolint ha-addon/Dockerfile

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff==0.11.13 mypy
          pip install -r requirements.txt || true

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy --config-file pyproject.toml *.py routes/ services/

      - name: Audit dependencies for CVEs
        run: pip install pip-audit && pip-audit -r requirements.txt
        continue-on-error: true

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck entrypoint.sh
          find rootfs -name '*.sh' -o -name 'run' -o -name 'finish' | xargs -r shellcheck --shell=bash || true
        continue-on-error: true

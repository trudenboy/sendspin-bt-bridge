name: Lint

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs-site/**"
      - "*.md"
      - "ha-addon/CHANGELOG.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs-site/**"
      - "*.md"
      - "ha-addon/CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint Dockerfile
          hadolint ha-addon/Dockerfile

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r requirements.txt || true

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy --config-file pyproject.toml *.py routes/ services/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libglib2.0-dev libportaudio2
      - name: Install dependencies
        run: pip install -r requirements.txt -r dev-requirements.txt
      - name: Run sendspin compatibility smoke test
        run: python scripts/check_sendspin_compat.py
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

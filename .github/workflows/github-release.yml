name: Create GitHub Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (leave blank to use the latest tag)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target tag and channel
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force --tags
          TAG="${INPUT_TAG}"
          if [ -z "${TAG}" ]; then
            TAG="$(git tag --sort=-version:refname | head -n 1)"
          fi
          if [ -z "${TAG}" ]; then
            echo "No tags found in the repository" >&2
            exit 1
          fi
          git rev-parse "${TAG}^{tag}" >/dev/null 2>&1 || git rev-parse "${TAG}^{commit}" >/dev/null 2>&1

          CHANNEL="stable"
          PRERELEASE="false"
          MAKE_LATEST="true"
          if [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            CHANNEL="rc"
            PRERELEASE="true"
            MAKE_LATEST="false"
          elif [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            CHANNEL="beta"
            PRERELEASE="true"
            MAKE_LATEST="false"
          elif [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported tag format: ${TAG}" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "make_latest=${MAKE_LATEST}" >> "$GITHUB_OUTPUT"
          {
            echo "### Release target"
            echo ""
            echo "- Tag: \`${TAG}\`"
            echo "- Version: \`${VERSION}\`"
            echo "- Channel: \`${CHANNEL}\`"
            echo "- Prerelease: \`${PRERELEASE}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sync HA addon directories on main
        id: sync_addon_repo
        env:
          CHANNEL: ${{ steps.resolve.outputs.channel }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          git checkout main
          git fetch --force --tags

          stable_tag="$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          rc_tag="$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$' | head -n 1 || true)"
          beta_tag="$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$' | head -n 1 || true)"

          case "${CHANNEL}" in
            stable) stable_tag="v${VERSION}" ;;
            rc) rc_tag="v${VERSION}" ;;
            beta) beta_tag="v${VERSION}" ;;
          esac

          cmd=(python scripts/generate_ha_addon_variants.py sync-current-repo --output-dir .)
          if [ -n "${stable_tag}" ]; then
            cmd+=(--stable-version "${stable_tag#v}")
          fi
          if [ -n "${rc_tag}" ]; then
            cmd+=(--rc-version "${rc_tag#v}")
          fi
          if [ -n "${beta_tag}" ]; then
            cmd+=(--beta-version "${beta_tag#v}")
          fi
          "${cmd[@]}"

          if [ -z "$(git status --short)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "- HA addon directories on \`main\` already matched the latest stable/rc/beta tags" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A .
          git commit -m "chore: sync HA addon directories for ${VERSION}"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "- Updated \`ha-addon\` / \`ha-addon-rc\` / \`ha-addon-beta\` on \`main\` from the latest known channel tags" >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize current-repo HA publishing
        run: |
          echo "- Home Assistant addon channels are published from this repository itself using \`ha-addon\`, \`ha-addon-rc\`, and \`ha-addon-beta\` directories." >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve previous comparable release
        id: previous_release
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const targetTag = '${{ steps.resolve.outputs.tag }}';
            const targetChannel = '${{ steps.resolve.outputs.channel }}';

            function parseTag(tag) {
              const normalized = String(tag || '').replace(/^v/, '');
              const match = normalized.match(/^(\d+)\.(\d+)\.(\d+)(?:-(rc|beta)\.(\d+))?$/);
              if (!match) return null;
              return {
                major: Number(match[1]),
                minor: Number(match[2]),
                patch: Number(match[3]),
                channel: match[4] || 'stable',
                serial: Number(match[5] || 0),
              };
            }

            function compareTags(a, b) {
              const pa = parseTag(a);
              const pb = parseTag(b);
              if (!pa || !pb) return String(a).localeCompare(String(b));
              for (const key of ['major', 'minor', 'patch']) {
                if (pa[key] !== pb[key]) return pa[key] - pb[key];
              }
              const rank = { beta: 0, rc: 1, stable: 2 };
              if (rank[pa.channel] !== rank[pb.channel]) return rank[pa.channel] - rank[pb.channel];
              return pa.serial - pb.serial;
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const comparableTags = releases
              .filter((release) => !release.draft)
              .filter((release) => {
                const parsed = parseTag(release.tag_name);
                if (!parsed || release.tag_name === targetTag) return false;
                if (targetChannel === 'stable') return !release.prerelease && parsed.channel === 'stable';
                return parsed.channel === targetChannel;
              })
              .map((release) => release.tag_name)
              .sort(compareTags);

            const previousTag = comparableTags.filter((tag) => compareTags(tag, targetTag) < 0).pop() || '';
            core.setOutput('tag', previousTag);
            await core.summary
              .addRaw(previousTag
                ? `Previous comparable ${targetChannel} release tag for notes: ${previousTag}`
                : `No previous comparable ${targetChannel} release found; generating notes without a lower bound`)
              .write();

      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const tag = '${{ steps.resolve.outputs.tag }}';
            const previousTag = '${{ steps.previous_release.outputs.tag }}';
            const params = { owner, repo, tag_name: tag };
            if (previousTag) params.previous_tag_name = previousTag;
            const response = await github.rest.repos.generateReleaseNotes(params);
            core.setOutput('body', response.data.body);

      - name: Compose release body
        id: release_body
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          cat > /tmp/generated-notes.md <<'EOF_GENERATED_NOTES'
          ${{ steps.notes.outputs.body }}
          EOF_GENERATED_NOTES
          python3 scripts/release_notes.py \
            --version "${VERSION}" \
            --changelog CHANGELOG.md \
            --generated-notes-file /tmp/generated-notes.md \
            --output /tmp/release-body.md
          {
            echo "body<<EOF_RELEASE_BODY"
            cat /tmp/release-body.md
            echo "EOF_RELEASE_BODY"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### Release body preview"
            echo ""
            sed -n '1,80p' /tmp/release-body.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const tag = '${{ steps.resolve.outputs.tag }}';
            const body = ${{ toJSON(steps.release_body.outputs.body) }};
            const prerelease = '${{ steps.resolve.outputs.prerelease }}' === 'true';
            const makeLatest = '${{ steps.resolve.outputs.make_latest }}';

            let existing = null;
            try {
              const response = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              existing = response.data;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const basePayload = {
              owner,
              repo,
              tag_name: tag,
              name: tag,
              body,
              draft: false,
              prerelease,
              make_latest: makeLatest,
            };

            if (existing) {
              await github.rest.repos.updateRelease({
                ...basePayload,
                release_id: existing.id,
              });
              await core.summary.addRaw(`Updated existing release for ${tag}`).write();
              return;
            }

            await github.rest.repos.createRelease({
              ...basePayload,
              generate_release_notes: false,
            });
            await core.summary.addRaw(`Created release for ${tag}`).write();

name: Create Stable GitHub Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Stable tag to release (leave blank to use the latest stable tag)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve stable target tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force --tags
          TAG="${INPUT_TAG}"
          if [ -z "${TAG}" ]; then
            TAG="$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          fi
          if [ -z "${TAG}" ]; then
            echo "No stable tags found in the repository" >&2
            exit 1
          fi
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "This workflow only creates GitHub releases for stable tags. Use tag-only CI for prerelease tags: ${TAG}" >&2
            exit 1
          fi
          git rev-parse "${TAG}^{tag}" >/dev/null 2>&1 || git rev-parse "${TAG}^{commit}" >/dev/null 2>&1

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          {
            echo "### Stable release target"
            echo ""
            echo "- Tag: \`${TAG}\`"
            echo "- Version: \`${VERSION}\`"
            echo "- Prerelease tags remain tag-only and do not create GitHub release objects."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize current-repo HA publishing
        run: |
          {
            echo "- Home Assistant addon channels are published from this repository itself using \`ha-addon\`, \`ha-addon-rc\`, and \`ha-addon-beta\` directories."
            echo "- Addon directory sync now happens on tag push for stable/rc/beta, independently from this stable-only GitHub release workflow."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve previous stable release
        id: previous_release
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const targetTag = '${{ steps.resolve.outputs.tag }}';

            function parseStableTag(tag) {
              const match = String(tag || '').match(/^v(\d+)\.(\d+)\.(\d+)$/);
              if (!match) return null;
              return {
                major: Number(match[1]),
                minor: Number(match[2]),
                patch: Number(match[3]),
              };
            }

            function compareStableTags(a, b) {
              const pa = parseStableTag(a);
              const pb = parseStableTag(b);
              if (!pa || !pb) return String(a).localeCompare(String(b));
              for (const key of ['major', 'minor', 'patch']) {
                if (pa[key] !== pb[key]) return pa[key] - pb[key];
              }
              return 0;
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const previousTag = releases
              .filter((release) => !release.draft && !release.prerelease)
              .map((release) => release.tag_name)
              .filter((tag) => parseStableTag(tag) && tag !== targetTag)
              .sort(compareStableTags)
              .filter((tag) => compareStableTags(tag, targetTag) < 0)
              .pop() || '';

            core.setOutput('tag', previousTag);
            await core.summary
              .addRaw(previousTag
                ? `Previous stable release tag for notes: ${previousTag}`
                : 'No previous stable release found; generating notes without a lower bound')
              .write();

      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const tag = '${{ steps.resolve.outputs.tag }}';
            const previousTag = '${{ steps.previous_release.outputs.tag }}';
            const params = { owner, repo, tag_name: tag };
            if (previousTag) params.previous_tag_name = previousTag;
            const response = await github.rest.repos.generateReleaseNotes(params);
            core.setOutput('body', response.data.body);

      - name: Compose release body
        id: release_body
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          cat > /tmp/generated-notes.md <<'EOF_GENERATED_NOTES'
          ${{ steps.notes.outputs.body }}
          EOF_GENERATED_NOTES
          python3 scripts/release_notes.py \
            --version "${VERSION}" \
            --changelog CHANGELOG.md \
            --generated-notes-file /tmp/generated-notes.md \
            --output /tmp/release-body.md
          {
            echo "body<<EOF_RELEASE_BODY"
            cat /tmp/release-body.md
            echo "EOF_RELEASE_BODY"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### Release body preview"
            echo ""
            sed -n '1,80p' /tmp/release-body.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const tag = '${{ steps.resolve.outputs.tag }}';
            const body = ${{ toJSON(steps.release_body.outputs.body) }};

            let existing = null;
            try {
              const response = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              existing = response.data;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const basePayload = {
              owner,
              repo,
              tag_name: tag,
              name: tag,
              body,
              draft: false,
              prerelease: false,
              make_latest: 'true',
            };

            if (existing) {
              await github.rest.repos.updateRelease({
                ...basePayload,
                release_id: existing.id,
              });
              await core.summary.addRaw(`Updated existing stable release for ${tag}`).write();
              return;
            }

            await github.rest.repos.createRelease({
              ...basePayload,
              generate_release_notes: false,
            });
            await core.summary.addRaw(`Created stable release for ${tag}`).write();

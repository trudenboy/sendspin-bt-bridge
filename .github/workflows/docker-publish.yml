name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.3.0)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_push: ${{ steps.check.outputs.should_push }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set push flag
        id: check
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == refs/tags/v* ]] || \
             [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "should_push=true" >> $GITHUB_OUTPUT
          else
            echo "should_push=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync ha-addon version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=$(grep -oP '(?<=VERSION = ")[^"]+' config.py | head -1)
          sed -i "s/^version: .*/version: \"${VERSION}\"/" ha-addon/config.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ha-addon/config.yaml
          git diff --staged --quiet || git commit -m "chore: sync ha-addon version to ${VERSION} [skip ci]"
          git push origin HEAD:main

  build-amd64:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: needs.prepare.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build linux/amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: ${{ needs.prepare.outputs.should_push == 'true' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-amd64
          cache-from: type=gha,scope=buildcache-amd64
          cache-to: type=gha,scope=buildcache-amd64,mode=max

  build-arm64:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: needs.prepare.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build linux/arm64
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: ${{ needs.prepare.outputs.should_push == 'true' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64
          cache-from: type=gha,scope=buildcache-arm64
          cache-to: type=gha,scope=buildcache-arm64,mode=max

  merge:
    needs: [prepare, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.should_push == 'true'
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute dispatch version
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        run: echo "DISPATCH_VERSION=${INPUT_TAG#v}" >> $GITHUB_ENV
        env:
          INPUT_TAG: ${{ inputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
            type=raw,value=${{ env.DISPATCH_VERSION }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}

      - name: Create multi-arch manifest
        run: |
          TAGS=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && TAGS+=("-t" "$tag")
          done <<< "$TAGS_RAW"
          docker buildx imagetools create \
            "${TAGS[@]}" \
            "$REGISTRY/$IMAGE_NAME:buildcache-amd64" \
            "$REGISTRY/$IMAGE_NAME:buildcache-arm64"
        env:
          TAGS_RAW: ${{ steps.meta.outputs.tags }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

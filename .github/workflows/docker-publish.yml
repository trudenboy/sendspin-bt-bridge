name: Build and Push Docker Image

on:
  workflow_run:
    workflows:
      - Pytest
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v2.41.0 or v2.41.0-rc.1)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      sendspin_version: ${{ steps.resolve_sendspin.outputs.version }}
      metadata_tags: ${{ steps.publish_context.outputs.metadata_tags }}
      release_channel: ${{ steps.publish_context.outputs.channel }}
      release_version: ${{ steps.publish_context.outputs.version }}
      should_publish: ${{ steps.publish_context.outputs.should_publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag || github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libdbus-glib-1-dev libglib2.0-dev

      - name: Resolve release sendspin version
        id: resolve_sendspin
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          VERSION=$(python - <<'PY'
          import importlib.metadata as metadata
          print(metadata.version("sendspin"))
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved sendspin version: ${VERSION}"

      - name: Resolve publish context
        id: publish_context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          target_sha="${GIT_SHA}"
          if [ "${EVENT_NAME}" = "workflow_run" ] && [ -n "${WORKFLOW_RUN_HEAD_SHA}" ]; then
            target_sha="${WORKFLOW_RUN_HEAD_SHA}"
          fi

          target_ref="${INPUT_TAG:-}"
          if [ -z "${target_ref}" ]; then
            if [ "${EVENT_NAME}" = "workflow_run" ]; then
              tag_ref="$(git tag --points-at "${target_sha}" | grep -E '^v' | head -n1 || true)"
              if [ -n "${tag_ref}" ]; then
                target_ref="${tag_ref}"
              else
                target_ref="${WORKFLOW_RUN_HEAD_BRANCH:-}"
              fi
            else
              target_ref="${REF_NAME}"
            fi
          fi

          channel="stable"
          version=""
          metadata_tags=""
          should_publish="true"

          if [[ "${target_ref}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            printf -v metadata_tags '%s\n%s\n%s\n%s\n%s' \
              "type=raw,value=${version}" \
              "type=raw,value=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" \
              "type=raw,value=${BASH_REMATCH[1]}" \
              "type=raw,value=latest" \
              "type=raw,value=stable"
          elif [[ "${target_ref}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+)$ ]]; then
            channel="rc"
            version="${BASH_REMATCH[1]}"
            printf -v metadata_tags '%s\n%s' \
              "type=raw,value=${version}" \
              "type=raw,value=rc"
          elif [[ "${target_ref}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+)$ ]]; then
            channel="beta"
            version="${BASH_REMATCH[1]}"
            printf -v metadata_tags '%s\n%s' \
              "type=raw,value=${version}" \
              "type=raw,value=beta"
          elif [[ "${target_ref}" == "beta" ]]; then
            channel="beta"
            short_sha="${target_sha::7}"
            printf -v metadata_tags '%s\n%s' \
              "type=raw,value=beta" \
              "type=raw,value=beta-${short_sha}"
          elif [ "${EVENT_NAME}" != "workflow_run" ]; then
            short_sha="${target_sha::7}"
            version="${short_sha}"
            printf -v metadata_tags '%s\n%s' \
              "type=raw,value=latest" \
              "type=raw,value=stable"
          else
            channel="skip"
            should_publish="false"
          fi

          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"
          {
            echo "metadata_tags<<EOF"
            printf '%s\n' "${metadata_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Publish context"
            echo ""
            echo "- Ref: \`${target_ref}\`"
            echo "- Channel: \`${channel}\`"
            echo "- Publish: \`${should_publish}\`"
            if [ "${should_publish}" = "true" ]; then
              echo "- Tags:"
              while IFS= read -r line; do
                [ -n "${line}" ] && echo "  - \`${line#type=raw,value=}\`"
              done <<< "${metadata_tags}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: prepare
    if: ${{ needs.prepare.outputs.should_publish == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag || github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SENDSPIN_VERSION=${{ needs.prepare.outputs.sendspin_version }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=build-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Smoke test built image
        run: |
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          docker pull "${image}"
          docker run --rm --entrypoint python3 "${image}" scripts/check_sendspin_compat.py
          docker run --rm --entrypoint python3 "${image}" scripts/check_container_runtime.py

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [prepare, build]
    if: ${{ needs.prepare.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ needs.prepare.outputs.metadata_tags }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

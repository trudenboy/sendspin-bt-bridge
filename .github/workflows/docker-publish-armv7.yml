name: Build and Push Docker Image (armv7)

on:
  workflow_run:
    workflows:
      - Pytest
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v2.41.0 or v2.41.0-rc.1)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          startsWith(github.event.workflow_run.head_branch, 'v') &&
          !contains(github.event.workflow_run.head_branch, '-')
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sendspin_version: ${{ steps.resolve_sendspin.outputs.version }}
      release_channel: ${{ steps.publish_context.outputs.channel }}
      metadata_tags: ${{ steps.publish_context.outputs.metadata_tags }}
      should_publish: ${{ steps.publish_context.outputs.should_publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag || github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libdbus-glib-1-dev libglib2.0-dev

      - name: Resolve release sendspin version
        id: resolve_sendspin
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          VERSION=$(python - <<'PY'
          import importlib.metadata as metadata
          print(metadata.version("sendspin"))
          PY
          )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved sendspin version: ${VERSION}"

      - name: Resolve publish context
        id: publish_context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          target_sha="${GIT_SHA}"
          if [ "${EVENT_NAME}" = "workflow_run" ] && [ -n "${WORKFLOW_RUN_HEAD_SHA}" ]; then
            target_sha="${WORKFLOW_RUN_HEAD_SHA}"
          fi

          target_ref="${INPUT_TAG:-}"
          if [ -z "${target_ref}" ]; then
            if [ "${EVENT_NAME}" = "workflow_run" ]; then
              tag_ref="$(git tag --points-at "${target_sha}" | grep -E '^v' | head -n1 || true)"
              if [ -n "${tag_ref}" ]; then
                target_ref="${tag_ref}"
              else
                target_ref="${WORKFLOW_RUN_HEAD_BRANCH:-}"
              fi
            else
              target_ref="${REF_NAME}"
            fi
          fi

          channel="skip"
          should_publish="false"
          metadata_tags=""
          if [[ "${target_ref}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            channel="stable"
            should_publish="true"
            version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            printf -v metadata_tags '%s\n%s\n%s\n%s\n%s' \
              "type=raw,value=${version}" \
              "type=raw,value=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" \
              "type=raw,value=${BASH_REMATCH[1]}" \
              "type=raw,value=latest" \
              "type=raw,value=stable"
          elif [[ "${target_ref}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+)$ ]]; then
            channel="rc"
          elif [[ "${target_ref}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+)$ ]]; then
            channel="beta"
          fi

          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"
          {
            echo "metadata_tags<<EOF"
            printf '%s\n' "${metadata_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### ARMv7 publish context"
            echo ""
            echo "- Ref: \`${target_ref}\`"
            echo "- Channel: \`${channel}\`"
            if [ "${should_publish}" = "true" ] && [ "${channel}" = "stable" ]; then
              echo "- ARMv7 build: enabled"
            else
              echo "- ARMv7 build: skipped (stable releases only)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build-armv7:
    needs: prepare
    if: ${{ needs.prepare.outputs.should_publish == 'true' && needs.prepare.outputs.release_channel == 'stable' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag || github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v7
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SENDSPIN_VERSION=${{ needs.prepare.outputs.sendspin_version }}
          cache-from: type=gha,scope=build-linux/arm/v7
          cache-to: type=gha,mode=max,scope=build-linux/arm/v7,ignore-error=true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Smoke test built image
        run: |
          image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
          docker pull --platform linux/arm/v7 "${image}"
          docker run --rm --platform linux/arm/v7 --entrypoint python3 "${image}" scripts/check_sendspin_compat.py
          docker run --rm --platform linux/arm/v7 --entrypoint python3 "${image}" scripts/check_container_runtime.py

      - name: Export digest
        run: |
          digest="${{ steps.build.outputs.digest }}"
          echo "armv7_digest=${digest}" >> $GITHUB_OUTPUT
          echo "ARMv7 digest: ${digest}"
        id: digest

      - name: Extract metadata for tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ needs.prepare.outputs.metadata_tags }}

      - name: Append armv7 to manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG=$(jq -cr '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON" | sed "s|${IMAGE}:||")

          echo "Waiting for main workflow manifest (tag: ${TAG})..."
          for i in $(seq 1 60); do
            if docker buildx imagetools inspect "${IMAGE}:${TAG}" > /dev/null 2>&1; then
              echo "Manifest found after ${i} attempts"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::warning::Main manifest not found — publishing armv7-only manifest"
              docker buildx imagetools create \
                $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
                "${IMAGE}@${{ steps.build.outputs.digest }}"
              exit 0
            fi
            sleep 30
          done

          EXISTING=$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --format '{{range .Manifest.Manifests}}{{.Digest}} {{end}}')
          echo "Existing digests: ${EXISTING}"
          echo "ARMv7 digest: ${{ steps.build.outputs.digest }}"

          DIGEST_ARGS=""
          for d in ${EXISTING}; do
            DIGEST_ARGS="${DIGEST_ARGS} ${IMAGE}@${d}"
          done
          DIGEST_ARGS="${DIGEST_ARGS} ${IMAGE}@${{ steps.build.outputs.digest }}"

          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ${DIGEST_ARGS}

          echo "✅ Manifest updated with armv7"

name: Build and Push Docker Image (armv7)

on:
  push:
    tags:
      - "v*"
    branches:
      - beta
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v2.41.0 or v2.41.0-rc.1)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-armv7:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v7
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=linux/arm/v7
          cache-to: type=gha,mode=max,scope=linux/arm/v7,ignore-error=true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          digest="${{ steps.build.outputs.digest }}"
          echo "armv7_digest=${digest}" >> $GITHUB_OUTPUT
          echo "ARMv7 digest: ${digest}"
        id: digest

      - name: Resolve publish context
        id: publish_context
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          target_ref="${INPUT_TAG:-}"
          if [ -z "${target_ref}" ]; then
            target_ref="${REF_NAME}"
          fi

          metadata_tags=""
          if [[ "${target_ref}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            printf -v metadata_tags '%s\n%s\n%s\n%s\n%s' \
              "type=raw,value=${version}" \
              "type=raw,value=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" \
              "type=raw,value=${BASH_REMATCH[1]}" \
              "type=raw,value=latest" \
              "type=raw,value=stable"
          elif [[ "${target_ref}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}"
            printf -v metadata_tags '%s\n%s' \
              "type=raw,value=${version}" \
              "type=raw,value=rc"
          elif [[ "${target_ref}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}"
            printf -v metadata_tags '%s\n%s' \
              "type=raw,value=${version}" \
              "type=raw,value=beta"
          elif [[ "${target_ref}" == "beta" ]]; then
            short_sha="${GIT_SHA::7}"
            printf -v metadata_tags '%s\n%s' \
              "type=raw,value=beta" \
              "type=raw,value=beta-${short_sha}"
          else
            printf -v metadata_tags '%s\n%s' \
              "type=raw,value=latest" \
              "type=raw,value=stable"
          fi

          {
            echo "metadata_tags<<EOF"
            printf '%s\n' "${metadata_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata for tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ steps.publish_context.outputs.metadata_tags }}

      - name: Append armv7 to manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG=$(jq -cr '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON" | sed "s|${IMAGE}:||")

          echo "Waiting for main workflow manifest (tag: ${TAG})..."
          for i in $(seq 1 60); do
            if docker buildx imagetools inspect "${IMAGE}:${TAG}" > /dev/null 2>&1; then
              echo "Manifest found after ${i} attempts"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::warning::Main manifest not found — publishing armv7-only manifest"
              docker buildx imagetools create \
                $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
                "${IMAGE}@${{ steps.build.outputs.digest }}"
              exit 0
            fi
            sleep 30
          done

          EXISTING=$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --format '{{range .Manifest.Manifests}}{{.Digest}} {{end}}')
          echo "Existing digests: ${EXISTING}"
          echo "ARMv7 digest: ${{ steps.build.outputs.digest }}"

          DIGEST_ARGS=""
          for d in ${EXISTING}; do
            DIGEST_ARGS="${DIGEST_ARGS} ${IMAGE}@${d}"
          done
          DIGEST_ARGS="${DIGEST_ARGS} ${IMAGE}@${{ steps.build.outputs.digest }}"

          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ${DIGEST_ARGS}

          echo "✅ Manifest updated with armv7"

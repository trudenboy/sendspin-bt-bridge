name: _lint

on:
  workflow_call:
    inputs:
      version:
        description: "Version to inject into config.py before linting (empty = skip)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Inject version into config.py
        if: inputs.version != ''
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i "s/^VERSION = .*/VERSION = \"${VERSION}\"/" config.py
          sed -i "s/^BUILD_DATE = .*/BUILD_DATE = \"$(date -u +%Y-%m-%d)\"/" config.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ruff==0.11.13 mypy
          pip install -r requirements.txt || true

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy --config-file pyproject.toml *.py routes/ services/

      - name: Verify HA addon variants are in sync with template
        run: python scripts/generate_ha_addon_variants.py check-current-repo

      - name: Verify requirements.txt and pyproject.toml deps are in sync
        run: python scripts/sync_requirements.py --check

      - name: Lint Dockerfiles
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint
          hadolint Dockerfile
          hadolint ha-addon/Dockerfile

      - name: Lint shell scripts
        run: |
          sudo apt-get install -y -qq shellcheck > /dev/null 2>&1
          shellcheck entrypoint.sh
          find rootfs -name '*.sh' -o -name 'run' -o -name 'finish' | xargs -r shellcheck --shell=bash || true
        continue-on-error: true

      # Dependency CVE audit moved to ``_test.yml`` so it runs against
      # the already-installed venv (no need to rebuild ``dbus-python``
      # in a sandboxed virtualenv just to resolve metadata, which used
      # to fail in this lint job for lack of ``libdbus-1-dev``).

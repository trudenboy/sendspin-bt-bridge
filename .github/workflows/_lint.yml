name: _lint

on:
  workflow_call:
    inputs:
      version:
        description: "Version to inject into sendspin_bridge/config/__init__.py before linting (empty = skip)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Inject version into sendspin_bridge.config
        if: inputs.version != ''
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i "s/^VERSION = .*/VERSION = \"${VERSION}\"/" src/sendspin_bridge/config/__init__.py
          sed -i "s/^BUILD_DATE = .*/BUILD_DATE = \"$(date -u +%Y-%m-%d)\"/" src/sendspin_bridge/config/__init__.py

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.27"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system build dependencies
        # dbus-python ships sdist-only on PyPI; building requires the
        # libdbus headers. The full ``uv sync --frozen --extra dev`` pulls
        # the bridge package + all runtime deps so mypy sees the same
        # import surface as production.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev libglib2.0-dev

      - name: Install dependencies (sync from uv.lock)
        run: uv sync --frozen --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy --config-file pyproject.toml src/sendspin_bridge/

      - name: Verify HA addon variants are in sync with template
        run: uv run python scripts/generate_ha_addon_variants.py check-current-repo

      - name: Verify uv.lock is in sync with pyproject.toml
        run: uv lock --check

      - name: Verify requirements.txt was regenerated from uv.lock
        # uv embeds the actual --output-file path in the export header, so
        # we have to regenerate in-place and then check git for drift —
        # the same trick the uv-export pre-commit hook uses locally.
        run: |
          uv export --no-hashes --no-dev --no-emit-project --output-file requirements.txt
          git diff --exit-code requirements.txt

      - name: Lint Dockerfiles
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint
          hadolint Dockerfile
          hadolint ha-addon/Dockerfile

      - name: Lint shell scripts
        run: |
          sudo apt-get install -y -qq shellcheck > /dev/null 2>&1
          shellcheck entrypoint.sh
          find rootfs -name '*.sh' -o -name 'run' -o -name 'finish' | xargs -r shellcheck --shell=bash || true
        continue-on-error: true

      # Dependency CVE audit moved to ``_test.yml`` so it runs against
      # the already-installed venv (no need to rebuild ``dbus-python``
      # in a sandboxed virtualenv just to resolve metadata, which used
      # to fail in this lint job for lack of ``libdbus-1-dev``).

name: CI

on:
  push:
    branches:
      - main
      - beta
    paths-ignore:
      - VERSION
      - "docs-site/**"
      - "*.md"
      - "ha-addon*/CHANGELOG.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs-site/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/_lint.yml

  test:
    uses: ./.github/workflows/_test.yml

  test-vue:
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npx vue-tsc --noEmit
        working-directory: ui
      - run: npx vitest run
        working-directory: ui

  vue-build:
    needs: test-vue
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci --ignore-scripts
        working-directory: ui
      - run: npx vite build
        working-directory: ui

name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below so we can reproduce and fix the issue.

        **Before submitting:** check [existing issues](https://github.com/trudenboy/sendspin-bt-bridge/issues) and [Q&A discussions](https://github.com/trudenboy/sendspin-bt-bridge/discussions/categories/q-a).

        For Bluetooth/Audio specific problems (no sound, pairing failures, codec issues) use the **[Bluetooth & Audio Issue](https://github.com/trudenboy/sendspin-bt-bridge/issues/new?template=bluetooth_audio.yml)** template instead.

        💡 **Tip:** Use the **Report** button in the web UI header to auto-fill this form and generate a diagnostics file.

  - type: textarea
    id: description
    validations:
      required: true
    attributes:
      label: Description
      description: A clear description of the bug. What happened? What did you expect?
      placeholder: |
        When I try to ... the bridge does ... instead of ...

  - type: textarea
    id: steps
    validations:
      required: true
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Start the bridge with config ...
        2. Open the web UI
        3. Click on ...
        4. See error ...

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?

  - type: input
    id: version
    validations:
      required: true
    attributes:
      label: Bridge Version
      description: Shown in the web UI header or `docker logs` at startup
      placeholder: "2.24.0"

  - type: dropdown
    id: deployment
    validations:
      required: true
    attributes:
      label: Deployment Method
      options:
        - Home Assistant Addon
        - Docker Compose
        - Proxmox LXC
        - OpenWrt LXC
        - Bare Metal (pip install)

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, audio system, BT adapter (auto-filled by Report button)"
      placeholder: "Debian 12 / PulseAudio / Intel AX200"

  - type: dropdown
    id: device_count
    attributes:
      label: Number of Bluetooth Devices
      options:
        - "1"
        - "2-3"
        - "4+"

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: |
        Attach the diagnostics `.txt` file downloaded by the Report button, or paste relevant logs here.
        Manual log collection: `docker logs sendspin-client --tail 100` / `journalctl -u sendspin-client -n 100`
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots of the web UI or error messages.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information.
